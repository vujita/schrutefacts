name: schrutefacts

services:
  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: builder
    command: sh -c "cd packages/db && pnpm db:migrate"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/schrutefacts
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    init: true
    ports:
      - "${WEB_PORT:-3002}:3001"
    environment:
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-UBgLVZReZRnzP1yOapSVsFoCrouGudVC}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:${WEB_PORT:-3002}}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:${WEB_PORT:-3002}}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/schrutefacts
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./apps/web
        - action: rebuild
          path: ./packages
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./pnpm-lock.yaml

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: schrutefacts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
