name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: schrutefacts
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d schrutefacts"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm oxlint

      - name: Format check
        run: pnpm oxfmt --check

      - name: Build
        env:
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/schrutefacts
          BETTER_AUTH_SECRET: ci-build-secret-not-for-runtime-0123456789
          BETTER_AUTH_URL: http://localhost:3001
          CORS_ORIGIN: http://localhost:3001
        run: pnpm build
